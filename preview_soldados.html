<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Preview Soldados – QG do Combatente</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0b0e1a;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    padding: 48px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }
  h1 { color: #fff; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; }

  .grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    max-width: 900px;
  }

  .card {
    background: #141828;
    border-radius: 16px;
    padding: 20px 16px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 120px;
    border: 1px solid transparent;
    transition: transform 0.2s, box-shadow 0.3s;
    cursor: default;
  }
  .card:hover {
    transform: translateY(-6px);
  }
  .card .rank-name {
    font-size: 0.65rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    text-align: center;
    line-height: 1.3;
  }
  .card .rank-level {
    font-size: 0.58rem;
    opacity: 0.55;
    color: #aaa;
    text-align: center;
  }
  .card .rank-hours {
    font-size: 0.6rem;
    opacity: 0.45;
    color: #888;
  }

  hr { width: 100%; border: none; border-top: 1px solid #1e2440; max-width: 900px; }
  .section-label { color: #555; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }
</style>
</head>
<body>
<h1>⚔️ QG do Combatente — Soldados por Posto</h1>

<div class="grid" id="grid-main"></div>

<hr>
<div class="section-label">Bloqueados (greyed)</div>
<div class="grid" id="grid-greyed"></div>

<script>
const PATENTES = [
  { nome: "Recruta",           horas: 0,    estrelas: 1,  labelCor: "#e8e8e8", cintura: "white"   },
  { nome: "Cabo",              horas: 10,   estrelas: 2,  labelCor: "#ffe066", cintura: "yellow"  },
  { nome: "Sargento",          horas: 30,   estrelas: 3,  labelCor: "#ff9900", cintura: "orange"  },
  { nome: "Subtenente",        horas: 60,   estrelas: 4,  labelCor: "#2ecc40", cintura: "green"   },
  { nome: "Tenente",           horas: 100,  estrelas: 5,  labelCor: "#3399ff", cintura: "blue"    },
  { nome: "Capitão",           horas: 180,  estrelas: 6,  labelCor: "#aa44ee", cintura: "purple"  },
  { nome: "Major",             horas: 300,  estrelas: 7,  labelCor: "#a0522d", cintura: "brown"   },
  { nome: "Tenente-Coronel",   horas: 500,  estrelas: 8,  labelCor: "#e02020", cintura: "red"     },
  { nome: "Coronel",           horas: 800,  estrelas: 9,  labelCor: "#cc0000", cintura: "darkred" },
  { nome: "General de Divisão",horas: 1200, estrelas: 10, labelCor: "#f5d020", cintura: "black"   }
];

function renderSoldier(p, size, greyed) {
  const isBlack  = p.cintura === 'black';
  const fill     = greyed ? '#3a3a3a' : (isBlack ? '#111' : p.labelCor);
  const outline  = greyed ? '#555'    : (isBlack ? '#f5d020' : p.labelCor);
  const glow     = greyed ? 'none'    : (isBlack
                    ? 'drop-shadow(0 0 10px #f5d020cc)'
                    : `drop-shadow(0 0 8px ${p.labelCor}bb)`);
  const opacity  = greyed ? 0.4 : 1;

  const n = Math.min(p.estrelas || 1, 10);
  let chestStars = '';
  const visibleStars = Math.min(n, 3);
  const starSpacing = 5;
  const startStarX = 24 - ((visibleStars - 1) * starSpacing) / 2;
  for (let i = 0; i < visibleStars; i++) {
    chestStars += `<circle cx="${(startStarX + i * starSpacing).toFixed(1)}" cy="26" r="1.8" fill="${isBlack ? '#f5d020' : '#fff'}" opacity="${greyed ? 0.4 : 0.9}"/>`;
  }

  const w = size;
  const h = Math.round(size * 68 / 48);

  return `<svg width="${w}" height="${h}" viewBox="0 0 48 68" fill="none"
      xmlns="http://www.w3.org/2000/svg"
      style="filter:${glow};display:block;opacity:${opacity}">
      <!-- Helmet -->
      <ellipse cx="24" cy="7" rx="9" ry="5.5" fill="${outline}" opacity="0.9"/>
      <rect x="15" y="10" width="18" height="3" rx="1.5" fill="${outline}"/>
      <!-- Head -->
      <circle cx="24" cy="13" r="6.5" fill="${fill}" stroke="${outline}" stroke-width="1"/>
      <!-- Neck -->
      <rect x="21.5" y="18.5" width="5" height="4" rx="1" fill="${fill}"/>
      <!-- Arms -->
      <rect x="9" y="20" width="5.5" height="15" rx="2.5" fill="${fill}" stroke="${outline}" stroke-width="0.8"/>
      <rect x="33.5" y="20" width="5.5" height="15" rx="2.5" fill="${fill}" stroke="${outline}" stroke-width="0.8"/>
      <!-- Torso -->
      <rect x="14.5" y="22" width="19" height="16" rx="2" fill="${fill}" stroke="${outline}" stroke-width="1"/>
      <!-- Epaulettes -->
      <rect x="14.5" y="22" width="5" height="2" rx="1" fill="${outline}" opacity="0.7"/>
      <rect x="28.5" y="22" width="5" height="2" rx="1" fill="${outline}" opacity="0.7"/>
      <!-- Chest stars -->
      ${chestStars}
      <!-- Belt -->
      <rect x="14.5" y="36.5" width="19" height="3" rx="1" fill="${outline}" opacity="${isBlack ? 0.95 : 0.7}"/>
      <!-- Legs -->
      <rect x="15" y="39" width="8" height="18" rx="2.5" fill="${fill}" stroke="${outline}" stroke-width="0.8"/>
      <rect x="25" y="39" width="8" height="18" rx="2.5" fill="${fill}" stroke="${outline}" stroke-width="0.8"/>
      <!-- Boots -->
      <rect x="13.5" y="54" width="10.5" height="5.5" rx="2" fill="${outline}" opacity="0.85"/>
      <rect x="24" y="54" width="10.5" height="5.5" rx="2" fill="${outline}" opacity="0.85"/>
      ${isBlack ? `<path d="M17 7 L20 2 L24 5 L28 2 L31 7" stroke="#f5d020" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>` : ''}
  </svg>`;
}

// Main grid
const grid = document.getElementById('grid-main');
PATENTES.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.borderColor = p.labelCor + '33';
  card.style.boxShadow = p.cintura === 'black'
    ? `0 0 20px #f5d02055, inset 0 0 12px #f5d02011`
    : `0 0 16px ${p.labelCor}22`;
  card.innerHTML = `
    ${renderSoldier(p, 64, false)}
    <div class="rank-name" style="color:${p.cintura === 'black' ? '#f5d020' : p.labelCor}">${p.nome}</div>
    <div class="rank-level">Nível ${i + 1} · ${p.estrelas}★</div>
    <div class="rank-hours">${p.horas}h</div>
  `;
  grid.appendChild(card);
});

// Greyed grid
const grid2 = document.getElementById('grid-greyed');
PATENTES.forEach(p => {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.borderColor = '#2a2f50';
  card.innerHTML = `
    ${renderSoldier(p, 40, true)}
    <div class="rank-name" style="color:#444">${p.nome}</div>
  `;
  grid2.appendChild(card);
});
</script>
</body>
</html>
